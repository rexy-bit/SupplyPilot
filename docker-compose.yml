services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: supplypilot-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
    ports:
      - "5000:5000"
    networks:
      - supplypilot-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: supplypilot-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - supplypilot-net

networks:
  supplypilot-net:
    driver: bridge